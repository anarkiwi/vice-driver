name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run unit tests with coverage gate (>=85%)
        # pyproject.toml's addopts already include --cov=vice_driver
        # --cov-fail-under=85, so a bare `pytest` enforces the gate.
        run: pytest -ra
      - name: Smoke-import package
        run: python -c "import vice_driver; print(vice_driver.__version__)"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install "ruff>=0.4"
      - name: Ruff lint
        run: ruff check vice_driver tests
      - name: Ruff format
        run: ruff format --check vice_driver tests

  black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install black
        run: pip install "black>=24.0"
      - name: Black format check
        run: black --check vice_driver tests

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package + pyright
        run: pip install -e ".[dev]"
      - name: Pyright
        run: pyright vice_driver
